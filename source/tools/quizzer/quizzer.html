<!--
  Flashcard Quizzer — a single-file spaced-repetition study app.

  USAGE: Open quizzer.html in a browser. Import one or more CSV decks via
  drag-and-drop or the file picker. All progress is stored in localStorage.

  CSV FORMAT (header row required):
    title, question, correct, wrong1, wrong2, wrong3, wrong4 (optional), explanation

  STUDY MODES:
    - Spaced Repetition (FSRS-4.5): due cards first, then new cards (recommended)
    - Least Practiced: unseen cards first, then lowest stability
    - Random: shuffled subset (max 20 per session)
    - Browse: read-only view of all cards with answers

  FEATURES:
    - FSRS-4.5 algorithm tracking stability, difficulty, and due dates per card
    - Self-rated difficulty after each answer (Again / Hard / Good / Easy)
    - Session summaries with response-time breakdown and mastery stats
    - Deck management: import, rename, delete, mastery chart per deck
    - Export/import full state as JSON; multi-language UI (EN, NL, IT)
-->

<title>Quizzer - multiple-choice flashcards for faster learning</title>
<script>window.goatcounter = {no_onload: true};</script>
<script data-goatcounter="https://topherhunt.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<script>
function gcEvent(name) {
  if (window.goatcounter && window.goatcounter.count) {
    window.goatcounter.count({path: 'quizzer-' + name, title: 'quizzer ' + name, event: true});
  } else {
    setTimeout(function() { gcEvent(name); }, 200);
  }
}
</script>
<style>
:root {
  --bg: #141720;
  --surface: #1c2030;
  --elevated: #2a3045;
  --accent: #53d8a8;
  --error: #e74c6f;
  --text: #e8e8e8;
  --muted: #8899aa;
  --amber: #f5a623;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 16px;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--elevated);
}
header h1 { font-size: 1.3rem; font-weight: 700; cursor: pointer; }
header nav { display: flex; gap: 8px; }

/* Buttons */
.btn {

  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 20px;
  border-radius: var(--radius);
  border: none;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  text-align: center;
}
.btn-primary { background: #0d6efd; color: white; }
.btn-primary:hover { filter: brightness(1.15); }
.btn-secondary { background: #6c757d; color: white; }
.btn-secondary:hover { filter: brightness(1.2); }
.btn-danger { background: #dc3545; color: white; }
.btn-danger:hover { filter: brightness(1.1); }
.btn-success { background: #198754; color: white; }
.btn-success:hover { filter: brightness(1.1); }
.btn-outline-primary { background: transparent; color: #0d6efd; border: 1px solid #0d6efd; }
.btn-outline-primary:hover { background: #0d6efd; color: white; }
a { color: #0d6efd; }
.btn-outline-danger { background: transparent; color: #dc3545; border: 1px solid #dc3545; }
.btn-outline-danger:hover { background: #dc3545; color: white; }
.btn-small { padding: 8px 14px; font-size: 0.85rem; width: auto; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

/* Import zone */
.import-zone {
  border: 2px dashed var(--muted);
  border-radius: var(--radius);
  padding: 32px 16px;
  text-align: center;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 16px;
}
.import-zone.dragover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(83, 216, 168, 0.05);
}
.import-zone input { display: none; }

/* Mastery chart tooltip */
.chart-wrap { position: relative; }
.chart-wrap svg circle { cursor: pointer; }
.chart-tooltip {
  position: absolute;
  pointer-events: none;
  background: var(--elevated);
  border: 1px solid var(--muted);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 12px;
  color: var(--fg);
  white-space: pre;
  line-height: 1.5;
  transform: translate(-50%, -100%);
  margin-top: -6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 10;
}
.chart-tooltip.visible { opacity: 1; }

/* Deck list */
.deck-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.15s;
}
.deck-item:hover { opacity: 0.85; }
.deck-item-info { flex: 1; }
.deck-item-info h3 { font-size: 0.95rem; font-weight: 600; }
.deck-item-info p { font-size: 0.8rem; color: var(--muted); }
.deck-item-actions { display: flex; gap: 6px; }

/* Mode selection */
.mode-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 16px;
}
.mode-btn {
  background: var(--surface);
  border: 1px solid var(--elevated);
  border-radius: var(--radius);
  padding: 14px 16px;
  color: var(--text);
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn:hover { border-color: var(--accent); }
.mode-btn .mode-title { font-weight: 600; font-size: 1rem; }
.mode-btn .mode-desc { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.mode-btn.primary {
  border-color: var(--accent);
  background: rgba(83, 216, 168, 0.12);
  box-shadow: 0 0 0 1px var(--accent) inset;
}
.mode-btn.primary .mode-title { color: var(--accent); font-weight: 700; font-size: 1.05rem; }
.mode-btn.primary .mode-desc { color: var(--fg); }
.mode-btn.primary:hover { background: rgba(83, 216, 168, 0.18); }

/* Due counts */
.due-counts {
  display: flex;
  gap: 16px;
  margin: 16px 0;
}
.due-count {
  text-align: center;
  flex: 1;
  padding: 12px;
  background: var(--surface);
  border-radius: var(--radius);
}
.due-count .number { font-size: 1.5rem; font-weight: 700; }
.due-count .label { font-size: 0.75rem; color: var(--muted); }

/* Study counter */
.study-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.study-counter {
  font-size: 0.85rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.progress-dots {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  justify-content: flex-end;
  margin-bottom: 0.5rem;
}
.progress-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
}
.progress-dot.correct { background: var(--accent); }
.progress-dot.incorrect { background: var(--error);
}

/* Question */
.question-text {
  font-size: 1.1rem;
  font-weight: 500;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* Answer options */
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  width: 100%;
  min-height: 48px;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--elevated);
  background: var(--surface);
  color: var(--text);
  font-size: 0.95rem;
  line-height: 1.4;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
}
.option-btn:hover:not(.locked) { border-color: var(--accent); }
.option-btn.locked { cursor: default; }
.option-btn.correct {
  border-color: var(--accent);
  background: rgba(83, 216, 168, 0.15);
  color: var(--accent);
}
.option-btn.incorrect {
  border-color: var(--error);
  background: rgba(231, 76, 111, 0.15);
  color: var(--error);
}
.option-btn.reveal-correct {
  border-color: var(--accent);
  color: var(--accent);
  opacity: 0.7;
}

/* Explanation */
.explanation {
  background: var(--elevated);
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 16px;
  font-size: 0.9rem;
  line-height: 1.6;
  border-left: 3px solid var(--accent);
  animation: slideIn 0.25s ease-out;
}

@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Session summary */
.summary-stat {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--elevated);
  font-size: 0.95rem;
}
.summary-stat:last-child { border-bottom: none; }
.summary-stat .label { color: var(--muted); }

/* Speed tier bar */
.tier-bar { display: flex; gap: 2px; margin: 8px 0; height: 24px; border-radius: 4px; overflow: hidden; }
.tier-bar > div { height: 100%; }
.tier-bar .t-fast { background: var(--accent); }
.tier-bar .t-medium { background: var(--text); opacity: 0.4; }
.tier-bar .t-slow { background: var(--amber); }
.tier-bar .t-incorrect { background: var(--error); }

.tier-legend {
  display: flex;
  gap: 12px;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.tier-legend span::before {
  content: '';
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  margin-right: 4px;
  vertical-align: middle;
}
.tier-legend .l-fast::before { background: var(--accent); }
.tier-legend .l-medium::before { background: var(--text); opacity: 0.4; }
.tier-legend .l-slow::before { background: var(--amber); }
.tier-legend .l-incorrect::before { background: var(--error); }

/* Review mode */
.review-nav {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.review-nav .btn { flex: 1; }
.review-answer {
  background: rgba(83, 216, 168, 0.1);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 12px;
  margin: 12px 0;
  color: var(--accent);
  font-size: 0.95rem;
}
.review-wrong {
  background: var(--surface);
  border: 1px solid var(--elevated);
  border-radius: var(--radius);
  padding: 12px;
  margin: 4px 0;
  color: var(--text);
  font-size: 0.95rem;
}

/* Stats */
.stat-bar {
  display: flex;
  height: 24px;
  border-radius: 4px;
  overflow: hidden;
  margin: 8px 0;
}
.stat-bar .mastered { background: var(--accent); }
.stat-bar .review-state { background: #4a90d9; }
.stat-bar .learning { background: var(--amber); }
.stat-bar .new-state { background: var(--elevated); }

.stat-legend {
  display: flex;
  gap: 12px;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.stat-legend span::before {
  content: '';
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  margin-right: 4px;
  vertical-align: middle;
}
.stat-legend .l-mastered::before { background: var(--accent); }
.stat-legend .l-review::before { background: #4a90d9; }
.stat-legend .l-learning::before { background: var(--amber); }
.stat-legend .l-new::before { background: var(--elevated); }

.stats-table {
  width: 100%;
  font-size: 0.8rem;
  border-collapse: collapse;
}
.stats-table th {
  text-align: left;
  color: var(--muted);
  padding: 6px 4px;
  border-bottom: 1px solid var(--elevated);
  font-weight: 500;
}
.stats-table td {
  padding: 8px 4px;
  border-bottom: 1px solid var(--elevated);
}

.session-item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--elevated);
  font-size: 0.85rem;
  cursor: pointer;
  transition: opacity 0.15s;
}
.session-item:hover { opacity: 0.75; }
.session-item:last-child { border-bottom: none; }

/* Confirm dialog */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
}
.dialog {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 400px;
  width: 100%;
}
.dialog h3 { margin-bottom: 12px; }
.dialog p { color: var(--muted); margin-bottom: 16px; font-size: 0.9rem; }
.dialog-btns { display: flex; gap: 10px; }
.dialog-btns .btn { flex: 1; }

/* Utility */
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.rating-buttons { display: flex; gap: 8px; }
.rating-buttons .btn { flex: 1; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-muted { color: var(--muted); font-size: 0.85rem; }
.text-accent { color: var(--accent); }
.text-error { color: var(--error); }
.hidden { display: none !important; }

/* Back button */
.back-row {
  margin-bottom: 2px;
}
.back-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.9rem;
  cursor: pointer;
  padding: 4px 0;
}
.back-btn:hover { color: var(--accent); }
</style>
</head>

let currentLang = localStorage.getItem('quizzer_lang') || 'en';
function t(key) { return LANGS[currentLang][key] ?? LANGS.en[key] ?? key; }
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('quizzer_lang', lang);
  document.documentElement.lang = LANGS[lang]._locale.slice(0, 2);
  document.documentElement.dir = LANGS[lang]._dir || 'ltr';
  initLangSelect();
  applyNavLabels();
  handleRoute();
}
function applyNavLabels() {
  const h = document.getElementById('nav-home');
  const s = document.getElementById('nav-settings');
  const hp = document.getElementById('nav-help');
  if (h) h.textContent = t('navHome');
  if (s) s.textContent = t('navSettings');
  if (hp) hp.textContent = t('navHelp');
}
function initLangSelect() {
  const sel = document.getElementById('lang-select');
  if (!sel) return;
  sel.innerHTML = Object.entries(LANGS).map(([code, l]) =>
    `<option value="${code}" ${code === currentLang ? 'selected' : ''}>${l._label} ${l._name}</option>`
  ).join('');
}

// ─── Storage ────────────────────────────────────────────────────────
const KEYS = { quizzes: 'quizzer_quizzes', stats: 'quizzer_stats', sessions: 'quizzer_sessions' };

function load(key) {
  try { return JSON.parse(localStorage.getItem(key)) || null; } catch { return null; }
}
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

function genId() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let id = '';
  for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * 62)];
  return id;
}

function getDecks() {
  const decks = load(KEYS.quizzes) || {};
  let migrated = false;
  const stats = load(KEYS.stats) || {};
  const sessions = load(KEYS.sessions) || [];

  // Phase 1: Migrate deck keys from name-based to stable ID
  for (const [key, deck] of Object.entries(decks)) {
    if (!deck.id) {
      deck.id = genId();
      decks[deck.id] = deck;
      delete decks[key];
      // Remap stats keys from oldKey::* to newId::*
      for (const sKey of Object.keys(stats)) {
        if (sKey.startsWith(key + '::')) {
          stats[`${deck.id}::${sKey.slice(key.length + 2)}`] = stats[sKey];
          delete stats[sKey];
        }
      }
      // Remap session references
      sessions.forEach(s => { if (s.deckName === key) s.deckName = deck.id; });
      migrated = true;
    }
  }

  // Phase 2: Assign stable IDs to cards that lack them
  for (const [deckId, deck] of Object.entries(decks)) {
    deck.questions.forEach((q, i) => {
      if (!q.id) {
        q.id = genId();
        const oldKey = `${deckId}::${i}`;
        if (stats[oldKey]) {
          stats[`${deckId}::${q.id}`] = stats[oldKey];
          delete stats[oldKey];
        }
        migrated = true;
      }
    });
  }

  if (migrated) {
    save(KEYS.quizzes, decks);
    save(KEYS.stats, stats);
    save(KEYS.sessions, sessions);
  }
  return decks;
}
function saveDecks(q) { save(KEYS.quizzes, q); }
function getStats() { return load(KEYS.stats) || {}; }
function saveStats(s) { save(KEYS.stats, s); }
function getSessions() { return load(KEYS.sessions) || []; }
function saveSessions(s) { save(KEYS.sessions, s); }

function getCardState(qid) {
  const stats = getStats();
  return stats[qid] || newCard();
}

function saveCardState(qid, card) {
  const stats = getStats();
  stats[qid] = card;
  saveStats(stats);
}

function recordSession(session) {
  const sessions = getSessions();
  sessions.push(session);
  saveSessions(sessions);
}

// ─── CSV Parser ─────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length) {
      if (text[i] === '"') {
        i++;
        let field = '';
        while (i < text.length) {
          if (text[i] === '"') {
            if (i + 1 < text.length && text[i + 1] === '"') { field += '"'; i += 2; }
            else { i++; break; }
          } else { field += text[i]; i++; }
        }
        row.push(field);
        if (i < text.length && text[i] === ',') i++;
      } else {
        let field = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') {
          field += text[i]; i++;
        }
        row.push(field);
        if (i < text.length && text[i] === ',') i++;
      }
      if (i >= text.length || text[i] === '\n' || text[i] === '\r') break;
    }
    if (text[i] === '\r') i++;
    if (text[i] === '\n') i++;
    if (row.length > 0 && !(row.length === 1 && row[0] === '')) rows.push(row);
  }
  return rows;
}

function importCSV(filename, text) {
  const rows = parseCSV(text);
  if (rows.length === 0) return t('emptyFile');
  const header = rows[0].map(c => c.trim().toLowerCase());
  // Detect format: with or without module, with or without wrong4
  const formats = [
    { cols: ['module','title','question','correct','wrong1','wrong2','wrong3','wrong4','explanation'], hasModule: true, hasWrong4: true },
    { cols: ['module','title','question','correct','wrong1','wrong2','wrong3','explanation'], hasModule: true, hasWrong4: false },
    { cols: ['title','question','correct','wrong1','wrong2','wrong3','wrong4','explanation'], hasModule: false, hasWrong4: true },
    { cols: ['title','question','correct','wrong1','wrong2','wrong3','explanation'], hasModule: false, hasWrong4: false },
  ];
  const fmt = formats.find(f => header.length === f.cols.length && f.cols.every((h, i) => header[i] === h));
  if (!fmt) {
    return t('invalidHeader') + 'title,question,correct,wrong1,wrong2,wrong3,explanation';
  }
  const questions = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (row.length !== fmt.cols.length) continue;
    let i = 0;
    const module = fmt.hasModule ? row[i++].trim() : '';
    const title = row[i++].trim();
    const question = row[i++].trim();
    const correct = row[i++].trim();
    const wrong = [row[i++].trim(), row[i++].trim(), row[i++].trim()];
    if (fmt.hasWrong4) wrong.push(row[i++].trim());
    const explanation = row[i].trim();
    questions.push({ id: genId(), module, title, question, correct, wrong, explanation });
  }
  if (questions.length === 0) return t('noValidQuestions');
  const decks = getDecks();
  const deckId = genId();
  decks[deckId] = { id: deckId, name: filename.replace(/\.csv$/i, ''), importedAt: Date.now(), questions };
  saveDecks(decks);
  return null;
}

// ─── Shuffle ────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── FSRS-4.5 Scheduler ────────────────────────────────────────────
const FSRS_W = [0.4, 0.6, 2.4, 5.8, 4.93, 0.94, 0.86, 0.01, 1.49, 0.14, 0.94, 2.18, 0.05, 0.34, 1.26, 0.29, 2.61];
const FSRS_RETENTION = 0.9;
const FSRS_MAX_INTERVAL = 36500;

const State = { New: 0, Learning: 1, Review: 2, Relearning: 3 };
const Rating = { Again: 1, Hard: 2, Good: 3, Easy: 4 };

function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

function newCard() {
  return { state: State.New, stability: 0, difficulty: 0, due: 0, lastReview: 0, reps: 0, lapses: 0, attempts: 0, correct: 0, incorrect: 0 };
}

function forgettingCurve(elapsed, stability) {
  if (stability <= 0) return 0;
  return Math.pow(1 + elapsed / (9 * stability), -1);
}

function fsrsInterval(stability) {
  const i = 9 * stability * (1 / FSRS_RETENTION - 1);
  return Math.min(Math.max(Math.round(i), 1), FSRS_MAX_INTERVAL);
}

function fsrsSchedule(card, rating, now) {
  now = now || Date.now();
  const w = FSRS_W;
  const next = { ...card };
  next.lastReview = now;
  next.attempts++;
  if (rating === Rating.Again) next.incorrect++;
  else next.correct++;

  if (card.state === State.New) {
    next.difficulty = clamp(w[4] - (rating - 3) * w[5], 1, 10);
    next.stability = [0, w[0], w[1], w[2], w[3]][rating];
    next.reps = 1;
    next.state = rating === Rating.Again ? State.Learning : State.Review;
  } else {
    const elapsed = Math.max(0, (now - card.lastReview) / 86400000);
    const r = forgettingCurve(elapsed, card.stability);

    // Update difficulty with mean reversion
    let d = card.difficulty - w[6] * (rating - 3);
    d = w[7] * (w[4] - (rating - 3) * w[5]) + (1 - w[7]) * d;
    next.difficulty = clamp(d, 1, 10);

    if (rating === Rating.Again) {
      next.lapses++;
      next.stability = w[11] * Math.pow(card.difficulty, -w[12])
        * (Math.pow(card.stability + 1, w[13]) - 1)
        * Math.exp((1 - r) * w[14]);
      next.state = State.Relearning;
    } else {
      const hardPenalty = rating === Rating.Hard ? w[15] : 1;
      const easyBonus = rating === Rating.Easy ? w[16] : 1;
      next.stability = card.stability * (
        1 + Math.exp(w[8]) * (11 - card.difficulty) * Math.pow(card.stability, -w[9])
        * (Math.exp((1 - r) * w[10]) - 1) * hardPenalty * easyBonus
      );
      next.state = State.Review;
      next.reps++;
    }
  }

  next.stability = Math.max(next.stability, 0.01);
  next.due = now + fsrsInterval(next.stability) * 86400000;
  return next;
}

// Rating is now user-chosen: incorrect = Again, correct = user picks Hard/Good/Easy

// Classify card for stats display
function cardMasteryState(card) {
  if (!card || card.state === State.New) return 'new';
  if (card.state === State.Learning || card.state === State.Relearning) return 'learning';
  if (card.state === State.Review && card.stability >= 21) return 'mastered';
  return 'review';
}

// ─── Data Migration ─────────────────────────────────────────────────
function migrateStats() {
  const stats = getStats();
  let migrated = false;
  for (const qid in stats) {
    const s = stats[qid];
    if (s.streak !== undefined && s.stability === undefined) {
      migrated = true;
      const card = newCard();
      card.attempts = s.attempts || 0;
      card.correct = s.correct || 0;
      card.incorrect = s.incorrect || 0;
      if (s.attempts > 0) {
        const acc = s.correct / s.attempts;
        if (s.streak >= 3 && acc >= 0.7) {
          card.state = State.Review;
          card.stability = Math.min(s.streak * 2, 30);
          card.difficulty = clamp(5 - s.streak * 0.5, 1, 10);
          card.due = (s.lastAttempt || Date.now()) + card.stability * 86400000;
          card.reps = s.correct;
          card.lastReview = s.lastAttempt || Date.now();
        } else {
          card.state = State.Learning;
          card.stability = 0.5;
          card.difficulty = clamp(5 + (s.incorrect / Math.max(s.attempts, 1)) * 3, 1, 10);
          card.due = Date.now();
          card.reps = s.correct;
          card.lapses = s.incorrect;
          card.lastReview = s.lastAttempt || Date.now();
        }
      }
      stats[qid] = card;
    }
  }
  if (migrated) saveStats(stats);
}

// ─── Deck Helpers ───────────────────────────────────────────────────
function getDueCounts(deckName) {
  const decks = getDecks();
  const deck = decks[deckName];
  if (!deck) return { due: 0, newCards: 0, total: 0 };
  const stats = getStats();
  const now = Date.now();
  let due = 0, newCards = 0;
  deck.questions.forEach(q => {
    const s = stats[`${deckName}::${q.id}`];
    if (!s || s.state === State.New) newCards++;
    else if (s.due <= now) due++;
  });
  return { due, newCards, total: deck.questions.length };
}

function buildStudyQueue(deckName, mode) {
  const decks = getDecks();
  const deck = decks[deckName];
  if (!deck) return [];
  const stats = getStats();
  const now = Date.now();

  const allCards = deck.questions.map(question => {
    const qid = `${deckName}::${question.id}`;
    const card = stats[qid] || newCard();
    return { qid, question, card };
  });

  if (mode === 'random') {
    return shuffle(allCards).slice(0, 20);
  }

  if (mode === 'leastpracticed') {
    // Unseen first, then lowest stability
    const sorted = [...allCards].sort((a, b) => {
      const aNew = a.card.state === State.New ? 0 : 1;
      const bNew = b.card.state === State.New ? 0 : 1;
      if (aNew !== bNew) return aNew - bNew;
      return a.card.stability - b.card.stability;
    });
    return sorted.slice(0, 20);
  }

  // Default: spaced repetition (FSRS)
  const dueCards = [];
  const newCards = [];
  const reviewedCards = [];
  for (const item of allCards) {
    if (item.card.state === State.New) {
      newCards.push(item);
    } else if (item.card.due <= now) {
      dueCards.push(item);
    } else {
      reviewedCards.push(item);
    }
  }
  // Most overdue first
  dueCards.sort((a, b) => a.card.due - b.card.due);
  const queue = [...dueCards, ...shuffle(newCards)];
  if (queue.length > 0) return queue.slice(0, 20);
  // All caught up — offer soonest-due reviewed cards
  reviewedCards.sort((a, b) => a.card.due - b.card.due);
  return reviewedCards.slice(0, 20);
}

// ─── Hash Router ────────────────────────────────────────────────────
function navigate(hash) {
  if (location.hash === hash) {
    handleRoute();
  } else {
    location.hash = hash;
  }
}

function handleRoute() {
  const hash = location.hash || '#/';
  const raw = hash.slice(2); // strip '#/'
  const parts = raw ? raw.split('/').map(decodeURIComponent) : [];

  if (parts.length === 0 || (parts.length === 1 && parts[0] === '')) {
    renderHome();
  } else if (parts.length === 1 && parts[0] === 'import') {
    renderImport();
  } else if (parts.length === 1 && parts[0] === 'settings') {
    renderGlobalSettings();
  } else if (parts.length === 1 && parts[0] === 'help') {
    gcEvent('help-viewed');
    renderHelp();
  } else if (parts.length === 1) {
    renderDeckHome(parts[0]);
  } else if (parts[1] === 'study' || parts[1] === 'leastpracticed' || parts[1] === 'random') {
    const mode = parts[1] === 'study' ? 'spaced' : parts[1];
    if (!studySession || studySession.deckName !== parts[0] || studySession.mode !== mode) {
      startStudySession(parts[0], mode);
    }
    renderStudyCard();
  } else if (parts[1] === 'browse') {
    activeQuiz = parts[0];
    renderBrowse();
  } else if (parts[1] === 'settings') {
    renderDeckSettings(parts[0]);
  } else if (parts[1] === 'stats') {
    gcEvent('stats-viewed');
    renderStats(parts[0]);
  } else if (parts[1] === 'session' && parts[2]) {
    renderSessionDetail(parts[0], parseInt(parts[2]));
  } else if (parts[1] === 'summary') {
    renderSessionSummary();
  } else {
    renderHome();
  }
}

// ─── Home View ──────────────────────────────────────────────────────
function renderHome() {
  const decks = getDecks();
  const names = Object.keys(decks).sort((a, b) => decks[a].name.localeCompare(decks[b].name, undefined, { sensitivity: 'base' }));

  let html = `<h2 style="margin-bottom:12px">${t('myDecks')}</h2>`;

  if (names.length === 0) {
    html += `<p class="text-muted text-center" style="margin:24px 0">${t('noDecks')}</p>`;
  } else {
    const peakMax = getPeakDailyReviewed();
    for (const name of names) {
      const deck = decks[name];
      const counts = getDueCounts(name);
      const dueText = counts.due > 0 ? `<span class="text-accent">${counts.due} ${t('dueToday').toLowerCase()}</span>` : '';
      const newText = counts.newCards > 0 ? `<span>${counts.newCards} ${t('newAvailable').toLowerCase()}</span>` : '';
      const parts = [t('nCards')(deck.questions.length), dueText, newText].filter(Boolean);
      html += `
        <div class="card deck-item" onclick="navigate('#/${encodeURIComponent(name)}')">
          <div class="deck-item-info">
            <h3>${esc(deck.name)}</h3>
            <p>${parts.join(' · ')}</p>
          </div>
          ${buildSparkline(name, peakMax)}
          ${buildDonut(name, 44)}
        </div>

  }

  html += `
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-outline-primary" style="width:auto" onclick="navigate('#/import')">${t('importDeck')}</button>
    </div>
  `;

  app().innerHTML = html;
}

        const path = `quizzes/${lang.code}/${encodeURIComponent(filename)}`;

      if (err) alert(t('error') + ': ' + err);

function setupImport() {
  const zone = $('import-zone');

  if (!zone || !input) return;

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
  input.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  for (const f of files) {

    reader.onload = e => {
      const err = importCSV(f.name, e.target.result);
      if (err) alert(t('error') + ': ' + err);

    reader.readAsText(f);
  }
}

// ─── Donut Chart ────────────────────────────────────────────────────
function buildDonut(deckName, size) {
  const deck = getDecks()[deckName];
  if (!deck || deck.questions.length === 0) return '';
  const stats = getStats();
  const total = deck.questions.length;
  let mNew = 0, mLearning = 0, mReview = 0, mMastered = 0;
  deck.questions.forEach(q => {
    const ms = cardMasteryState(stats[`${deckName}::${q.id}`]);
    if (ms === 'new') mNew++;
    else if (ms === 'learning') mLearning++;
    else if (ms === 'review') mReview++;
    else mMastered++;
  });

  // Weighted progress: mastered=100%, review=66%, learning=33%, new=0%
  const pct = Math.round((mMastered * 1 + mReview * 0.66 + mLearning * 0.33) / total * 100);

  const R = 20, r = 13, cx = 24, cy = 24;
  const segments = [
    { count: mMastered, color: 'var(--accent)' },
    { count: mReview, color: '#4a90d9' },
    { count: mLearning, color: 'var(--amber)' },
    { count: mNew, color: 'var(--elevated)' },
  ];

  let paths = '';
  let angle = -Math.PI / 2;
  for (const seg of segments) {
    if (seg.count === 0) continue;
    const sweep = (seg.count / total) * Math.PI * 2;
    if (seg.count === total) {
      // Full circle
      paths += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${seg.color}"/>`;
    } else {
      const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
      const x2 = cx + R * Math.cos(angle + sweep), y2 = cy + R * Math.sin(angle + sweep);
      const large = sweep > Math.PI ? 1 : 0;
      paths += `<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} Z" fill="${seg.color}"/>`;
    }
    angle += sweep;
  }
  // Inner circle for donut hole
  paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--surface)"/>`;
  // Center text
  paths += `<text x="${cx}" y="${cy + 1}" text-anchor="middle" dominant-baseline="middle" fill="var(--text)" font-size="9" font-weight="700">${pct}%</text>`;

  return `<svg width="${size}" height="${size}" viewBox="0 0 48 48" style="flex-shrink:0">${paths}</svg>`;
}

// ─── Deck Sparkline (practice volume last 14 days) ──────────────────
// Peak daily card count across ALL decks, ALL time — shared y-max for sparklines
function getPeakDailyReviewed() {
  const byDay = {};
  for (const s of getSessions()) {
    if (!s.reviewed) continue;
    const d = new Date(s.date); d.setHours(0, 0, 0, 0);
    const key = d.getTime();
    byDay[key] = (byDay[key] || 0) + s.reviewed;
  }
  const vals = Object.values(byDay);
  return vals.length ? Math.max(...vals) : 0;
}

function buildSparkline(deckId, peakMax) {
  const DAYS = 14;
  const W = 80, H = 32, PAD = 2;
  const counts = new Array(DAYS).fill(0);
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const start = now.getTime() - (DAYS - 1) * 86400000;
  for (const s of getSessions()) {
    if (s.deckName !== deckId || !s.reviewed) continue;
    const d = new Date(s.date); d.setHours(0, 0, 0, 0);
    const idx = Math.round((d.getTime() - start) / 86400000);
    if (idx >= 0 && idx < DAYS) counts[idx] += s.reviewed;
  }
  if (peakMax === 0 || counts.every(c => c === 0)) {
    return `<svg width="${W}" height="${H}" style="flex-shrink:0;margin-right:12px"></svg>`;
  }
  const innerW = W - PAD * 2, innerH = H - PAD * 2;
  const x = i => PAD + (i / (DAYS - 1)) * innerW;
  const y = v => PAD + innerH - (v / peakMax) * innerH;
  const pts = counts.map((v, i) => `${x(i)},${y(v)}`).join(' ');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="flex-shrink:0;margin-right:12px"><polyline points="${pts}" fill="none" stroke="#e05a5a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

// ─── Mastery History Chart ──────────────────────────────────────────
function buildMasteryChart(deckName, total) {
  const sessions = getSessions().filter(s => s.deckName === deckName && s.mastery);
  if (sessions.length === 0) return '';

  // Group by day, take last snapshot per day
  const byDay = {};
  for (const s of sessions) {
    const day = new Date(s.date).toISOString().slice(0, 10);
    byDay[day] = s.mastery;
  }
  const days = Object.keys(byDay).sort();

  // Prepend a "day 0" (day before first session) where all cards are new
  const firstDate = new Date(days[0]);
  firstDate.setDate(firstDate.getDate() - 1);
  const day0 = firstDate.toISOString().slice(0, 10);
  const points = [{ day: day0, mastered: 0, review: 0, learning: 0, new: total }];
  for (const d of days) {
    const m = byDay[d];
    points.push({ day: d, mastered: m.mastered, review: m.review, learning: m.learning, new: m.new });
  }

  if (points.length < 2) return '';

  const W = 560, H = 160, PAD_L = 12, PAD_R = 12, PAD_T = 4, PAD_B = 20;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;

  function x(i) { return PAD_L + (i / (points.length - 1)) * chartW; }
  function y(val) { return PAD_T + chartH - (val / total) * chartH; }

  // Build stacked areas: bottom to top: mastered, review, learning, new
  const layers = ['mastered', 'review', 'learning', 'new'];
  const colors = ['var(--accent)', '#4a90d9', 'var(--amber)', 'var(--elevated)'];
  const cumulative = points.map(() => 0);
  let paths = '';
  let dots = '';
  const layerTops = layers.map(() => []);

  for (let li = 0; li < layers.length; li++) {
    const prevCum = [...cumulative];
    for (let i = 0; i < points.length; i++) {
      cumulative[i] += points[i][layers[li]];
      layerTops[li].push(cumulative[i]);
    }
    // Path: top line left-to-right, then bottom line right-to-left
    let d = `M${x(0)},${y(cumulative[0])}`;
    for (let i = 1; i < points.length; i++) {
      d += ` L${x(i)},${y(cumulative[i])}`;
    }
    for (let i = points.length - 1; i >= 0; i--) {
      d += ` L${x(i)},${y(prevCum[i])}`;
    }
    d += ' Z';
    paths += `<path d="${d}" fill="${colors[li]}" opacity="0.7"/>`;
  }

  // Dots per layer boundary, colored to match each layer; tooltip lists all non-zero counts
  const colorByKey = { new: colors[3], learning: colors[2], review: colors[1], mastered: colors[0] };
  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    const lines = [`<div><strong>${p.day}</strong></div>`];
    for (const k of ['new', 'learning', 'review', 'mastered']) {
      if (p[k] > 0) lines.push(`<div><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${colorByKey[k]};margin-right:6px;vertical-align:middle"></span>${k[0].toUpperCase() + k.slice(1)}: ${p[k]}</div>`);
    }
    const tooltip = lines.join('');
    for (let li = 0; li < layers.length; li++) {
      if (p[layers[li]] === 0) continue;
      const cx = x(i), cy = y(layerTops[li][i]);
      dots += `<circle cx="${cx}" cy="${cy}" r="3" fill="${colors[li]}" onmouseenter="showChartTip(event,this)" onmouseleave="hideChartTip()" data-tip="${tooltip.replace(/"/g,'&quot;')}"/>`;
    }
  }

  // Date labels: one per point, up to 15; otherwise skip to stay under 15
  const fmt = d => { const p = d.split('-'); return `${parseInt(p[1])}/${parseInt(p[2])}`; };
  const step = Math.ceil(points.length / 15);
  let labels = '';
  for (let i = 0; i < points.length; i++) {
    if (i % step !== 0 && i !== points.length - 1) continue;
    const anchor = i === 0 ? 'start' : (i === points.length - 1 ? 'end' : 'middle');
    labels += `<text x="${x(i)}" y="${H - 2}" fill="var(--muted)" font-size="11" text-anchor="${anchor}">${fmt(points[i].day)}</text>`;
  }

  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;margin:12px 0 4px;display:block">${paths}${dots}${labels}</svg><div class="chart-tooltip" id="chart-tooltip"></div></div>`;
}

function showChartTip(e, el) {
  const wrap = el.closest('.chart-wrap');
  const tip = wrap.querySelector('.chart-tooltip');
  tip.innerHTML = el.getAttribute('data-tip');
  const wrapRect = wrap.getBoundingClientRect();
  const dotRect = el.getBoundingClientRect();
  const cx = dotRect.left + dotRect.width / 2 - wrapRect.left;
  const cy = dotRect.top - wrapRect.top;
  tip.style.left = cx + 'px';
  tip.style.top = cy + 'px';
  tip.classList.add('visible');
}
function hideChartTip() {
  document.querySelectorAll('.chart-tooltip.visible').forEach(t => t.classList.remove('visible'));
}

// ─── Study Session ──────────────────────────────────────────────────
function startStudySession(deckName, mode) {
  const queue = buildStudyQueue(deckName, mode);
  activeQuiz = deckName;
  studySession = {
    deckName,
    mode,
    queue,
    currentIndex: 0,
    reviewed: [],
    startTime: Date.now(),
    newStarted: 0,
    incorrect: 0,
    slow: 0,
    medium: 0,
    fast: 0,
    improved: 0,
    mastered: 0,
  };
}

function renderStudyCard() {
  if (!studySession || studySession.currentIndex >= studySession.queue.length) {
    if (studySession && studySession.reviewed.length > 0) {
      return navigate('#/' + encodeURIComponent(studySession.deckName) + '/summary');
    }
    // No cards in queue
    const dn = studySession?.deckName || activeQuiz;
    const deckLabel = esc(t('deckBreadcrumb')(getDecks()[dn]?.name || dn));
    studySession = null;
    app().innerHTML = `
      <div class="back-row"><button class="back-btn" onclick="navigate('#/${encodeURIComponent(dn)}')">&larr; ${deckLabel}</button></div>
      <p class="text-muted text-center mt-16">${t('noDue')}</p>
    `;
    return;
  }

  const { qid, question } = studySession.queue[studySession.currentIndex];
  const options = shuffle([question.correct, ...question.wrong]);
  const reviewedCount = studySession.reviewed.length;
  const remainingCount = studySession.queue.length - studySession.currentIndex;

  const deckLabel = esc(t('deckBreadcrumb')(getDecks()[studySession.deckName]?.name || studySession.deckName));

  let dots = '';
  for (const r of studySession.reviewed) {
    dots += `<div class="progress-dot ${r.isCorrect ? 'correct' : 'incorrect'}"></div>`;
  }

  let html = `
    <div class="back-row" style="display:flex;justify-content:space-between;align-items:center">
      <button class="back-btn" onclick="finishStudy()">&larr; ${deckLabel}</button>
      <div class="study-counter">${t('reviewed')}: ${reviewedCount} · ${t('remaining')}: ${remainingCount}</div>
    </div>
    <div class="progress-dots">${dots}</div>
    <div class="question-text" dir="auto">${esc(question.question)}</div>
    <div class="options" id="options">
  `;
  for (const opt of options) {
    html += `<button class="option-btn" dir="auto" data-answer="${esc(opt)}" onclick="handleAnswer(this)">${esc(opt)}</button>`;
  }
  html += `</div><div id="feedback"></div>`;
  app().innerHTML = html;
  questionStartTime = performance.now();
}

function handleAnswer(btn) {
  if (btn.classList.contains('locked')) return;
  const responseTime = performance.now() - questionStartTime;

  const { qid, question } = studySession.queue[studySession.currentIndex];
  const chosen = btn.dataset.answer;
  const isCorrect = chosen === question.correct;

  // Visual feedback on buttons
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.classList.add('locked');
    if (b.dataset.answer === question.correct) b.classList.add(isCorrect ? 'correct' : 'reveal-correct');
  });
  if (!isCorrect) btn.classList.add('incorrect');

  const feedback = $('feedback');
  const resultText = isCorrect ? `<span class="text-accent">${t('correct')}</span>` : `<span class="text-error">${t('incorrect')}</span>`;

  if (isCorrect) {
    // Correct: show explanation + let user choose difficulty rating
    feedback.innerHTML = `
      <div class="explanation"><p>${resultText}</p><p class="mt-8" dir="auto">${esc(question.explanation)}</p></div>
      <div class="rating-buttons mt-16">
        <button class="btn btn-danger" onclick="handleRating(${Rating.Hard}, ${Math.round(responseTime)})">${t('ratingHard')}</button>
        <button class="btn btn-primary" onclick="handleRating(${Rating.Good}, ${Math.round(responseTime)})">${t('ratingModerate')}</button>
        <button class="btn btn-success" onclick="handleRating(${Rating.Easy}, ${Math.round(responseTime)})">${t('ratingEasy')}</button>
      </div>
    `;
  } else {
    // Incorrect: auto-rate as Again and advance
    applyRating(Rating.Again, Math.round(responseTime));
    feedback.innerHTML = `
      <div class="explanation"><p>${resultText}</p><p class="mt-8" dir="auto">${esc(question.explanation)}</p></div>
      <button class="btn btn-secondary mt-16" onclick="advanceStudy()">${t('nextCard')}</button>
    `;
  }
}

function handleRating(rating, responseTime) {
  applyRating(rating, responseTime);
  advanceStudy();
}

function applyRating(rating, responseTime) {
  gcEvent('question-complete');
  const { qid, question } = studySession.queue[studySession.currentIndex];
  const isCorrect = rating !== Rating.Again;

  const oldCard = getCardState(qid);
  const prevState = oldCard.state;
  const newCardState = fsrsSchedule(oldCard, rating, Date.now());
  saveCardState(qid, newCardState);

  const wasNew = prevState === State.New;
  if (wasNew) studySession.newStarted++;
  if (rating === Rating.Again) {
    studySession.incorrect++;
    studySession.queue.push({ qid, question, card: newCardState });
  } else if (rating === Rating.Hard) studySession.slow++;
  else if (rating === Rating.Good) studySession.medium++;
  else studySession.fast++;

  const newMastery = cardMasteryState(newCardState);
  const oldMastery = wasNew ? 'new' : (prevState === State.Learning || prevState === State.Relearning ? 'learning' : (oldCard.stability >= 21 ? 'mastered' : 'review'));
  if (newMastery === 'mastered' && oldMastery !== 'mastered') studySession.mastered++;
  else if (newMastery === 'review' && (oldMastery === 'new' || oldMastery === 'learning')) studySession.improved++;

  studySession.reviewed.push({
    qid,
    title: question.title,
    rating,
    responseTime,
    prevState,
    newState: newCardState.state,
    isCorrect,
  });
}

function advanceStudy() {
  studySession.currentIndex++;
  renderStudyCard();
}

function recordStudySession(s) {
  if (s._recorded) return;
  s._recorded = true;
  const duration = Math.round((Date.now() - s.startTime) / 1000);
  const total = s.reviewed.length;
  const snapStats = getStats();
  const snapDeck = getDecks()[s.deckName];
  const snap = { new: 0, learning: 0, review: 0, mastered: 0 };
  if (snapDeck) {
    snapDeck.questions.forEach(q => {
      const ms = cardMasteryState(snapStats[`${s.deckName}::${q.id}`]);
      snap[ms]++;
    });
  }
  recordSession({
    date: Date.now(),
    deckName: s.deckName,
    mode: s.mode,
    duration,
    reviewed: total,
    newStarted: s.newStarted,
    incorrect: s.incorrect,
    slow: s.slow,
    medium: s.medium,
    fast: s.fast,
    improved: s.improved,
    mastered: s.mastered,
    cards: s.reviewed,
    mastery: snap,
  });
}

function finishStudy() {
  if (studySession && studySession.reviewed.length > 0) {
    recordStudySession(studySession);
    navigate('#/' + encodeURIComponent(studySession.deckName) + '/summary');
  } else {
    const dn = studySession?.deckName || activeQuiz || '';
    studySession = null;
    navigate('#/' + encodeURIComponent(dn));
  }
}

    </div>
    <div class="card">
      <div class="summary-stat"><span class="label">${t('newStarted')}</span><span>${s.newStarted || 0}</span></div>
      <div class="summary-stat"><span class="label">${t('cardsImproved')}</span><span>${s.improved || 0}</span></div>
      <div class="summary-stat"><span class="label">${t('cardsMastered')}</span><span class="text-accent">${s.mastered || 0}</span></div>
    </div>
  `;

  // Per-card breakdown
  if (s.cards && s.cards.length > 0) {
    const ratingLabels = {
      [Rating.Again]: t('ratingIncorrect'),
      [Rating.Hard]: t('ratingHard'),
      [Rating.Good]: t('ratingModerate'),
      [Rating.Easy]: t('ratingEasy'),
    };
    const ratingColors = {
      [Rating.Again]: 'text-error',
      [Rating.Hard]: '',
      [Rating.Good]: '',
      [Rating.Easy]: 'text-accent',
    };
    html += `
      <details class="mb-16">
        <summary style="cursor:pointer; color:var(--muted); font-size:0.85rem; margin:8px 0;">${t('questionDetail')}</summary>
        <div style="overflow-x:auto;">
        <table class="stats-table">
          <thead><tr><th>${t('questionCol')}</th><th></th><th>${t('time')}</th></tr></thead>
          <tbody>
    `;
    for (const c of s.cards) {
      const timeS = (c.responseTime / 1000).toFixed(1) + 's';
      const cls = ratingColors[c.rating] || '';
      html += `<tr><td>${esc(c.title || c.qid)}</td><td class="${cls}">${ratingLabels[c.rating]}</td><td>${timeS}</td></tr>`;
    }
    html += `</tbody></table></div></details>`;
  }

  app().innerHTML = html;
}

// ─── Export / Clear ─────────────────────────────────────────────────
function exportStats() {
  const data = {
    decks: getDecks(),
    stats: getStats(),
    sessions: getSessions(),
    exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `flashcards-export-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function clearAllData() {
  showConfirm(
    t('clearAllTitle'),
    t('clearAllConfirm'),
    () => {
      localStorage.removeItem(KEYS.quizzes);
      localStorage.removeItem(KEYS.stats);
      localStorage.removeItem(KEYS.sessions);
      navigate('#/');
    }
  );
}

function importJSONFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    let data;
    try { data = JSON.parse(e.target.result); }
    catch { alert(t('importInvalid')); return; }
    if (!data || typeof data !== 'object' || !data.decks) { alert(t('importInvalid')); return; }
    showConfirm(t('importJson'), t('importJsonConfirm'), () => {
      save(KEYS.quizzes, data.decks || {});
      save(KEYS.stats, data.stats || {});
      save(KEYS.sessions, data.sessions || []);
      navigate('#/');
    });
  };
  reader.readAsText(file);
}

const HELP_ICONS = [
  ['📝','🤖','📂'],
  ['⭐','🎯','🎲','📖'],
  ['❌','🐢','👍','⚡'],
  ['📊','🔵','📈','🔥'],
  ['💾','📥','⚠️'],
];
function renderHelp() {
  const sections = t('helpSections');
  let html = `<h2 class="mb-16">${t('navHelp')}</h2>`;
  html += `<div class="card"><p style="margin:0;font-size:0.9rem;line-height:1.5">${t('helpIntro')}</p></div>`;
  sections.forEach((sec, si) => {
    html += `<div class="card"><h3 style="margin-bottom:10px;font-size:1rem">${sec.title}</h3>`;
    sec.items.forEach((text, ii) => {
      const icon = HELP_ICONS[si][ii];
      html += `<div style="display:flex;gap:10px;align-items:flex-start;margin:8px 0;font-size:0.9rem;line-height:1.5"><span style="font-size:1.1rem;flex-shrink:0">${icon}</span><span>${text}</span></div>`;
    });

  });
  html += `<div class="card"><p style="margin:0 0 8px;font-size:0.9rem;line-height:1.5">Made with love by <a href="https://topherhunt.github.io" target="_blank" rel="noopener" style="color:var(--accent)">Topher Hunt</a></p><p style="margin:0;font-size:0.9rem;line-height:1.5">💬 ${t('helpForumNote')}</p></div>`;
  app().innerHTML = html;
}

function renderGlobalSettings() {
  app().innerHTML = `
    <h2 class="mb-16">${t('globalSettings')}</h2>
    <div class="card">
      <div style="margin-bottom:14px;">
        <select id="lang-select" onchange="setLang(this.value)" style="width:100%;background:var(--bg);color:var(--fg);border:1px solid var(--elevated);border-radius:var(--radius);padding:10px 12px;font-size:0.95rem;cursor:pointer;"></select>
      </div>

      </div>

// ─── Confirm Dialog ─────────────────────────────────────────────────
function showConfirm(title, message, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="dialog">
      <h3>${title}</h3>
      <p>${message}</p>
      <div class="dialog-btns">
        <button class="btn btn-secondary" id="confirm-cancel">${t('cancel')}</button>
        <button class="btn btn-danger" id="confirm-ok">${t('confirm')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirm-cancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#confirm-ok').addEventListener('click', () => { overlay.remove(); onConfirm(); });
}

// ─── Escape HTML ────────────────────────────────────────────────────
function esc(s) {
  if (typeof s !== 'string') return s;
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}
