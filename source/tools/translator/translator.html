<!--
  Translation Practice — AI-powered translation tool.

  USAGE: Open in a browser. Enter your Anthropic API key, pick your
  native language and target language. The AI generates sentences in
  your native language for you to translate, evaluates your attempts,
  and adapts difficulty based on performance.

  All progress is stored in localStorage. No server required.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traductor — Translation Practice</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<script>window.goatcounter = {no_onload: true};</script>
<script data-goatcounter="https://topherhunt.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<script>
function gcEvent(name) {
  if (window.goatcounter && window.goatcounter.count) {
    window.goatcounter.count({path: 'translator-' + name, title: 'translator ' + name, event: true});
  } else {
    setTimeout(function() { gcEvent(name); }, 200);
  }
}
</script>
<style>
:root {
  --bg: #141720;
  --surface: #1c2030;
  --elevated: #2a3045;
  --accent: #53d8a8;
  --error: #e74c6f;
  --text: #e8e8e8;
  --muted: #8899aa;
  --amber: #f5a623;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 16px;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--elevated);
}
header h1 { font-size: 1.3rem; font-weight: 700; cursor: pointer; }
header nav { display: flex; gap: 8px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 20px;
  border-radius: var(--radius);
  border: none;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  text-align: center;
}
.btn-primary { background: #0d6efd; color: white; }
.btn-primary:hover { filter: brightness(1.15); }
.btn-secondary { background: #6c757d; color: white; }
.btn-secondary:hover { filter: brightness(1.2); }
.btn-outline-primary { background: transparent; color: #0d6efd; border: 1px solid #0d6efd; }
.btn-outline-primary:hover { background: #0d6efd; color: white; }
.btn-outline-secondary { background: transparent; color: var(--muted); border: 1px solid var(--elevated); }
.btn-outline-secondary:hover { color: var(--text); border-color: var(--muted); }
.btn-danger { background: #dc3545; color: white; }
.btn-danger:hover { filter: brightness(1.1); }
.btn-success { background: #198754; color: white; }
.btn-success:hover { filter: brightness(1.1); }
.btn-small { padding: 8px 14px; font-size: 0.85rem; width: auto; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.help-item {
  padding: 6px 0;
  font-size: 0.9rem;
  line-height: 1.5;
}

/* Sentence display */
.sentence-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin-bottom: 16px;
  text-align: center;
}
.sentence-card .label {
  font-size: 0.75rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.sentence-card .sentence {
  font-size: 1.3rem;
  font-weight: 600;
  line-height: 1.5;
}
.sentence-card .hint {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 10px;
  font-style: italic;
}

/* Input area */
.input-area {
  margin-bottom: 16px;
}
.input-area textarea {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius);
  border: 2px solid var(--elevated);
  background: var(--surface);
  color: var(--text);
  font-size: 1.05rem;
  font-family: inherit;
  line-height: 1.5;
  resize: none;
  transition: border-color 0.2s;
  min-height: 60px;
}
.input-area textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.input-area textarea:disabled {
  opacity: 0.5;
}

/* Timer */
.timer {
  font-size: 0.8rem;
  color: var(--muted);
  text-align: right;
  margin-bottom: 8px;
  font-variant-numeric: tabular-nums;
}

/* Status bar */
.status-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.status-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 10px 14px;
  flex: 1;
  min-width: 80px;
  text-align: center;
  position: relative;
}
.status-item .value {
  font-size: 1.2rem;
  font-weight: 700;
}
.status-item .label {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

/* Level badge */
.level-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 700;
  background: var(--accent);
  color: var(--bg);
}

/* Feedback card */
.feedback-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  border-left: 4px solid var(--accent);
  animation: slideIn 0.25s ease-out;
}
.feedback-card.incorrect {
  border-left-color: var(--error);
}
.feedback-card .result-label {
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.feedback-card .result-label.correct { color: var(--accent); }
.feedback-card .result-label.wrong { color: var(--error); }
.feedback-card .expected {
  margin: 10px 0;
  padding: 10px;
  background: var(--elevated);
  border-radius: 6px;
  font-size: 0.95rem;
}
.feedback-card .expected .label {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.feedback-card .feedback-text {
  font-size: 0.9rem;
  margin: 10px 0;
  line-height: 1.6;
}
.feedback-card .feedback-text p {
  margin: 0 0 6px;
}
.feedback-card .feedback-text ul {
  margin: 6px 0;
  padding-left: 1.4em;
}
.feedback-card .feedback-text li {
  margin-bottom: 4px;
}
.feedback-card .grammar-note {
  font-size: 0.85rem;
  color: var(--amber);
  margin-top: 8px;
  padding: 8px 10px;
  background: rgba(245, 166, 35, 0.08);
  border-radius: 6px;
}
.feedback-card .score-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
  font-size: 0.85rem;
  color: var(--muted);
}
.feedback-card .score-row .score {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.spinner {
  display: inline-block;
  width: 28px;
  height: 28px;
  border: 3px solid var(--elevated);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

/* Settings */
.setting-group {
  margin-bottom: 20px;
}
.setting-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 6px;
}
.setting-group .input-row {
  display: flex;
  gap: 8px;
}
.setting-group input[type="password"],
.setting-group input[type="text"] {
  flex: 1;
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 2px solid var(--elevated);
  background: var(--surface);
  color: var(--text);
  font-size: 0.95rem;
  font-family: inherit;
}
.setting-group input:focus {
  outline: none;
  border-color: var(--accent);
}
.toggle-vis {
  background: var(--elevated);
  border: none;
  color: var(--muted);
  border-radius: var(--radius);
  padding: 0 14px;
  cursor: pointer;
  font-size: 0.85rem;
}
.setting-group select {
  width: 100%;
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 2px solid var(--elevated);
  background: var(--surface);
  color: var(--text);
  font-size: 0.95rem;
  font-family: inherit;
}
.setting-group select:focus {
  outline: none;
  border-color: var(--accent);
}

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
  position: relative;
}
.stat-card .value {
  font-size: 1.4rem;
  font-weight: 700;
}
.stat-card .label {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.stat-emoji {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 1.5rem;
  line-height: 1;
}

/* History table */
.history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
.history-table th {
  text-align: left;
  padding: 8px 6px;
  border-bottom: 1px solid var(--elevated);
  color: var(--muted);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  position: sticky;
  top: 0;
  background: var(--bg);
  cursor: pointer;
}
.history-table th:hover { color: var(--text); }
.history-table td {
  padding: 8px 6px;
  border-bottom: 1px solid var(--elevated);
  vertical-align: top;
}
.history-table tr:hover td { background: var(--surface); }
.history-scroll-wrap {
  position: relative;
}
.history-scroll {
  max-height: 400px;
  overflow-y: auto;
  border-radius: var(--radius);
  border: 1px solid var(--elevated);
}
.scroll-hint {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--elevated);
  color: var(--muted);
  font-size: 0.7rem;
  padding: 4px 12px;
  border-radius: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.scroll-hint.visible {
  opacity: 1;
}

.chart-tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--elevated);
  color: var(--text);
  font-size: 0.8rem;
  padding: 4px 10px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
}
.chart-tooltip.visible {
  opacity: 1;
}

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.7rem;
  background: var(--elevated);
  color: var(--muted);
  margin: 2px;
}

.tts-btn {
  background: transparent;
  border: 1px solid var(--elevated);
  color: var(--text);
  border-radius: var(--radius);
  padding: 4px 10px;
  font-size: 0.9rem;
  cursor: pointer;
  min-width: 36px;
  line-height: 1;
}
.tts-btn:hover:not(:disabled) { background: var(--elevated); }
.tts-btn:disabled { cursor: wait; opacity: 0.7; }
.tts-btn.playing { color: #f5a524; border-color: #f5a524; }

/* Fluency chart */
.fluency-chart {
  margin-bottom: 16px;
  overflow: hidden;
}
.fluency-chart canvas {
  width: 100%;
  height: auto;
}

/* Alert */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius);
  margin-bottom: 12px;
  font-size: 0.9rem;
}
.alert-error {
  background: rgba(231, 76, 111, 0.12);
  color: var(--error);
}
.alert-success {
  background: rgba(83, 216, 168, 0.12);
  color: var(--accent);
}

/* Overlay / dialog */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
}
.dialog {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 400px;
  width: 100%;
}
.dialog h3 { margin-bottom: 12px; }
.dialog .btn-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.dialog .btn-row .btn { flex: 1; }

/* Expand row */
.expand-row {
  cursor: pointer;
}
.expand-content {
  display: none;
  padding: 10px;
  background: var(--elevated);
  border-radius: 6px;
  margin-top: 6px;
  font-size: 0.8rem;
  line-height: 1.5;
}
.expand-content.open { display: block; }

/* Section heading */
.section-heading {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 20px 0 10px;
}
.section-heading:first-child { margin-top: 0; }

/* Misc */
.text-muted { color: var(--muted); }
.text-small { font-size: 0.8rem; }
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-12 { margin-bottom: 12px; }
.gap-8 { display: flex; gap: 8px; }
</style>
</head>

<div class="chart-tooltip" id="qa-chart-tooltip"></div>
<div class="container">

    <h1 id="qa-title" onclick="navigate('#/')">Traductor <span id="qa-tier-emoji"></span></h1>

      <button class="btn btn-small btn-outline-primary" id="qa-home-btn" onclick="navigate('#/')">Home</button>

  </header>

</div>

<script>

const API_URL = 'https://api.anthropic.com/v1/messages';

const SONNET_OUTPUT_COST = 15; // $/M tokens

  targetLang: 'translator_target_lang',
  feedbackLang: 'translator_feedback_lang',
  stats: 'translator_stats',
  history: 'translator_history',
  sessions: 'translator_sessions',

// Language definitions: code → {name in own language, english name}
// EN must stay first — it's the default when no selection is saved.
const NATIVE_LANGS = {

  nl: { label: 'Nederlands', en: 'Dutch' },
  es: { label: 'Español', en: 'Spanish' },
  tr: { label: 'Türkçe', en: 'Turkish' },
  de: { label: 'Deutsch', en: 'German' },
  it: { label: 'Italiano', en: 'Italian' },
  el: { label: 'Ελληνικά', en: 'Greek' },
  fr: { label: 'Français', en: 'French' },
};
// EN must stay first — it's the default when no selection is saved.
const TARGET_LANGS = {
  en: { label: 'English', en: 'English' },
  es: { label: 'Español', en: 'Spanish' },
  tr: { label: 'Türkçe', en: 'Turkish' },
  nl: { label: 'Nederlands', en: 'Dutch' },
  de: { label: 'Deutsch', en: 'German' },
  it: { label: 'Italiano', en: 'Italian' },
  el: { label: 'Ελληνικά', en: 'Greek' },
  fr: { label: 'Français', en: 'French' },
};

function getNativeLang() { return localStorage.getItem(KEYS.nativeLang) || 'en'; }
function getTargetLang() { return localStorage.getItem(KEYS.targetLang) || 'en'; }
function nativeName() { return NATIVE_LANGS[getNativeLang()].en; }
function targetName() { return TARGET_LANGS[getTargetLang()].en; }
function getFeedbackLang() { return localStorage.getItem(KEYS.feedbackLang) || 'native'; }
function feedbackLangName() { return getFeedbackLang() === 'native' ? nativeName() : targetName(); }
function getUILangCode() { return getFeedbackLang() === 'native' ? getNativeLang() : getTargetLang(); }

// ── System prompt (dynamic) ────────────────────────────────────────
function buildSystemPrompt() {
  const native = nativeName();
  const target = targetName();
  const targetLang = getTargetLang();
  const feedbackLang = feedbackLangName();
  return `You are a ${target} language tutor helping a ${native} speaker learn ${target}.

You have two tasks, performed one at a time based on the user's request:

TASK 1 - GENERATE: Generate a sentence in ${native} (NOT ${target}!) for the student to translate into ${target}.
- CRITICAL: The "es" field MUST be in ${native}. Never output a ${target} sentence in the "es" field. The student translates FROM ${native} TO ${target}.
- You will receive the student's recent history (if any) showing their sentences and whether they got them correct/incorrect
- Analyze their performance to choose an appropriate difficulty level
- If no history, start with very basic A1 sentences
- Gradually increase complexity as they demonstrate mastery
- If they are struggling, ease back to reinforce fundamentals
- Vary the grammar topics — don't repeat the same pattern many times in a row
- Output ONLY valid JSON: {"es": "${native} sentence", "hint": "brief grammar hint written in ${feedbackLang} about what ${target} construct to use", "topic": "grammar topic being tested (in ${feedbackLang})"}
- No extra text outside the JSON

TASK 2 - EVALUATE: Evaluate the student's ${target} translation of a ${native} sentence, AND generate the next sentence.
- You will receive the ${native} original, the student's ${target} attempt, and their recent history
- IMPORTANT: Output fields in THIS exact order. First produce "expected" so you have the reference answer BEFORE judging correctness.
- Output ONLY valid JSON: {"expected": "ideal ${target} translation", "correct": true/false, "score": 0-100, "feedback": "Start with a one-line summary, then use markdown bullet points for specific feedback items. Prefix each bullet with ✅ (good) or ❌ (needs work). Use **bold** for key terms and *italics* for example phrases. Write in ${feedbackLang}. Include grammar notes, patterns to learn, or tips to remember.", "fluency_level": "CEFR level", "notes": "2-3 sentence internal scratchpad in ${feedbackLang} — update based on previous notes and this evaluation. Track: recurring weaknesses, strengths, progression over time. Keep compact.", "next_es": "${native} sentence (NOT ${target}!)", "next_hint": "brief grammar hint in ${feedbackLang}", "next_topic": "grammar topic in ${feedbackLang}"}
- If the student's translation matches or is essentially equivalent to "expected", it MUST be marked correct with score 100. Do not second-guess a correct answer.

SEMANTIC EQUIVALENCE — CRITICAL:
- "expected" is ONE valid translation, NOT the only one. Many sentences have multiple equally correct translations.
- BEFORE deducting any points, ask yourself: "Would a native ${target} speaker accept this as a natural, grammatical translation that preserves the meaning?" If YES, it is CORRECT — score 100. Do not deduct.
- You MUST accept all of the following as fully correct (score 100, no deduction):
  • Synonyms and near-synonyms ("close to" vs "near", "begin" vs "start", "big" vs "large")
  • Idiomatic variants and common alternative phrasings ("if I had the time" vs "if I had time", "I'd like to" vs "I would like to")
  • Optional articles, particles, or words where the language genuinely permits both forms
  • Different but equally valid word orders
  • Contractions vs full forms
  • Equivalent registers (formal/informal) unless the source clearly demands one
- NEVER deduct points for stylistic preference, for "your version is more common", or because the student's wording differs from yours. Only deduct for actual errors: wrong meaning, ungrammatical constructions, wrong tense/agreement, misspellings, or missing required elements.
- If you find yourself writing feedback like "you could also say X" or "X is more natural" — STOP. That is not an error. Mark it correct.

- Write ALL feedback and notes in ${feedbackLang}.
- Be encouraging but honest
- Accept minor spelling variations but flag them
- Accept romanized/transliterated spellings (e.g. "tha pao" for "θα πάω" in Greek) — mark as correct but show the proper native script in "expected" and gently note the correct spelling
- PUNCTUATION: If punctuation is clearly wrong (missing period, wrong question mark, bad capitalization), note it gently in feedback and deduct a few points (score 80-90). Never mark an answer incorrect solely for punctuation. Do NOT claim punctuation is missing unless you are absolutely certain — re-read the student's answer carefully before critiquing punctuation.

CRITICAL FEEDBACK RULES:
- ONLY critique THIS translation. Do NOT mention past mistakes that the student got RIGHT this time. Your notes track patterns — feedback is ONLY about the current attempt.
- Do NOT double-count errors. If the student chose the wrong word, critique the word choice ONCE. Do not separately critique the article/gender of the wrong word they chose — that is the same error, not a second one.
- Each ❌ must point to a distinct, independent mistake in the current translation.
- Each ✅ must point to something the student actually did well in THIS translation, not something generic.
- If the translation is perfect, give score 100. NEVER deduct points to "leave room for growth" or for any reason other than an actual mistake. A perfect translation gets a perfect score.
- Do NOT mention specific score numbers in your feedback text. The UI displays the score separately.
- "score": 100 for perfect, 80+ for minor issues (small spelling or punctuation errors), 50-79 for partially correct (meaning preserved but grammar errors), 0-49 for incorrect meaning or major errors
- "fluency_level": assess the student's overall demonstrated level based on ALL the history, not just this one sentence. Use three gradations per CEFR level: "A1-", "A1", "A1+", "A2-", "A2", "A2+", "B1-", "B1", "B1+", "B2-", "B2", "B2+"
- "notes": Your internal scratchpad (write in ${feedbackLang}). You will receive your previous notes (if any) — update them based on this evaluation. Summarize in 2-3 compact sentences: what the student struggles with, what they're good at, and how they're progressing. This is your memory across rounds — keep it useful and concise. Do NOT repeat current feedback here — track PATTERNS across multiple rounds.
- "next_es", "next_hint", "next_topic": Generate the NEXT sentence for the student, following all GENERATE rules above. CRITICAL: "next_es" MUST be in ${native}, not ${target}.`;
}

// ── Storage helpers ────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function getStats() {
  return load(KEYS.stats, {
    totalAttempted: 0, totalCorrect: 0,
    currentStreak: 0, bestStreak: 0,
    runningScore: 0, totalTimeSpent: 0
  });
}
function saveStats(s) { save(KEYS.stats, s); }
function getHistory() { return load(KEYS.history, []); }
function saveHistory(h) { save(KEYS.history, h); }
function getSessions() { return load(KEYS.sessions, []); }
function saveSessions(s) { save(KEYS.sessions, s); }

// ── API ────────────────────────────────────────────────────────────
async function callClaude(userContent) {
  const apiKey = localStorage.getItem(KEYS.apiKey);
  if (!apiKey) { navigate('#/settings'); return null; }

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1024,
      system: buildSystemPrompt(),
      messages: [{ role: 'user', content: userContent }],
    }),
  });

  if (res.status === 401) {
    localStorage.removeItem(KEYS.apiKey);
    navigate('#/settings');
    throw new Error('Invalid API key. Please re-enter your key.');
  }
  if (res.status === 429) {
    throw new Error('Rate limited. Please wait a moment and try again.');
  }
  if (!res.ok) {
    throw new Error(`API error: ${res.status} ${res.statusText}`);
  }

  const data = await res.json();
  const text = data.content[0].text;
  const usage = data.usage || { input_tokens: 0, output_tokens: 0 };

  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch {
    // Extract JSON from markdown code blocks or raw text
    const blocks = [...text.matchAll(/\{[^{}]*(?:\{[^{}]*\}[^{}]*)*\}/g)];
    for (const m of blocks.reverse()) {
      try { parsed = JSON.parse(m[0]); break; } catch {}
    }
    if (!parsed) throw new Error('Could not parse AI response as JSON');
  }

  return { result: parsed, usage };
}

function formatHistoryForAI(history) {
  const native = nativeName();
  const recent = history.slice(-20);
  if (recent.length === 0) return `No history yet. This is the student's first sentence. Start at basic A1 level.`;
  return recent.map((h, i) =>
    `${i + 1}. ${native}: "${h.es}" → Student wrote: "${h.attempt}" → ${h.correct ? 'CORRECT' : 'INCORRECT'} (score: ${h.baseScore})`
  ).join('\n');
}

async function generateSentence(history) {
  const native = nativeName();
  const target = targetName();
  const historyText = formatHistoryForAI(history);
  const lastNotes = [...history].reverse().find(h => h.notes)?.notes || '';
  const notesSection = lastNotes ? `\n\nYour notes on this student:\n${lastNotes}` : '';
  const prompt = `TASK: GENERATE\n\nStudent's recent history:\n${historyText}${notesSection}\n\nGenerate the next ${native} sentence for them to translate into ${target}.`;
  return callClaude(prompt);
}

async function evaluateTranslation(es, attempt, history, isRetry, previousAttempt) {
  const native = nativeName();
  const target = targetName();
  const historyText = formatHistoryForAI(history);
  const lastNotes = [...history].reverse().find(h => h.notes)?.notes || '';
  const notesSection = lastNotes ? `\n\nYour previous notes:\n${lastNotes}` : '';
  const retrySection = isRetry
    ? `\n\nNOTE: This sentence is a RETRY — the student previously translated it incorrectly${previousAttempt ? ` (their earlier attempt was: "${previousAttempt}")` : ''}. Evaluate this new attempt on its own merits and acknowledge the retry briefly in your feedback if they've improved.`
    : '';
  const prompt = `TASK: EVALUATE\n\nStudent's recent history:\n${historyText}${notesSection}${retrySection}\n\nCurrent sentence:\n${native}: "${es}"\nStudent's ${target} translation: "${attempt}"\n\nEvaluate their translation.`;
  return callClaude(prompt);
}

// Find the oldest sentence whose most recent attempt was incorrect (unresolved).
function findUnresolvedWrong(history) {
  const latest = new Map();
  for (const h of history) latest.set(h.es, h);
  const seen = new Set();
  for (const h of history) {
    if (seen.has(h.es)) continue;
    seen.add(h.es);
    const last = latest.get(h.es);
    if (!last.correct) return last;
  }
  return null;
}

// Every Nth sentence, swap in an unresolved wrong sentence instead of the AI's next.
const RETRY_INTERVAL = 3;
function shouldInjectRetry(history) {
  return history.length > 0 && history.length % RETRY_INTERVAL === 0;
}
function pickRetrySentence(history) {
  const wrong = findUnresolvedWrong(history);
  if (!wrong) return null;
  return { es: wrong.es, hint: '', topic: '', isRetry: true, previousAttempt: wrong.attempt };
}

// ── Scoring ────────────────────────────────────────────────────────
function getTargetTime(sentence) {
  return (sentence || '').length / 2;
}

const TIER_EMOJIS = ['🪨','🌅','🕯️','🫧','🐢','🌊','💪','🏋️','🔥','🥷','💃','🦄','🐉'];
// const CEFR_EMOJIS = ['🐌','🐛','🐸','🦆','🐭','🐷','🦊','🐯','🦁','🐬','🦈','🐋'];
const CEFR_EMOJIS = ['🌱','🐛','🐸','🐣','🦆','🐭','🐷','🦊','🦁','🐬','🦈','🐋'];
function getTierEmoji(score) {
  const idx = Math.min(Math.floor(score / 10), TIER_EMOJIS.length - 1);
  return TIER_EMOJIS[Math.max(0, idx)];
}
function getCefrEmoji(level) {
  const idx = CEFR_LEVELS.indexOf(level);
  return CEFR_EMOJIS[idx >= 0 ? idx : 0];
}

function calculateTimeBonus(baseScore, elapsed, sentence) {
  const target = getTargetTime(sentence);
  if (elapsed >= target) return 0;
  // Faster than target → up to 30% bonus, scaled linearly
  const speedRatio = Math.max(0, 1 - elapsed / target);
  return Math.round(baseScore * 0.3 * speedRatio);
}

function updateEMA(current, newValue) {
  return current + EMA_ALPHA * (newValue - current);
}

// ── Router ─────────────────────────────────────────────────────────
function navigate(hash) {
  window.location.hash = hash;
  window.scrollTo(0, 0);
}

function handleRoute() {
  const hash = window.location.hash || '';
  const apiKey = localStorage.getItem(KEYS.apiKey);

  // Update header button text
  const homeBtn = document.getElementById('qa-home-btn');
  if (homeBtn) homeBtn.textContent = t('home');
  const helpBtn = document.getElementById('qa-help-btn');
  if (helpBtn) helpBtn.textContent = t('help');
  const settingsBtn = document.getElementById('qa-settings-btn');
  if (settingsBtn) settingsBtn.textContent = t('settings');
  const tierEl = document.getElementById('qa-tier-emoji');
  if (tierEl) {
    const history = getHistory();
    const lastLevel = history.length > 0 ? history[history.length - 1].fluencyLevel : null;
    tierEl.textContent = lastLevel ? getCefrEmoji(lastLevel) : '';
  }

  if (!apiKey && !hash.startsWith('#/settings') && !hash.startsWith('#/help')) {
    navigate('#/settings');
    return;
  }

  if (hash.startsWith('#/practice')) {
    renderPractice();
  } else {
    // Leaving practice — cancel any in-flight generate and save session
    generateEpoch++;
    if (sessionSentences.length > 0) endSession();
    if (hash.startsWith('#/settings')) renderSettings();
    else if (hash.startsWith('#/help')) { gcEvent('help-viewed'); renderHelp(); }
    else { gcEvent('stats-viewed'); renderStats(); }
  }
}

window.addEventListener('hashchange', handleRoute);

function preserveKeyInput(fn) {
  const snap = (id) => {
    const el = document.getElementById(id);
    return el ? { val: el.value, visible: el.type === 'text' } : null;
  };
  const restore = (id, s) => {
    if (!s) return;
    const el = document.getElementById(id);
    if (!el) return;
    el.value = s.val;
    if (s.visible) { el.type = 'text'; el.nextElementSibling.textContent = t('hide'); }
  };
  const a = snap('qa-api-key');
  const b = snap('qa-openai-key');
  fn();
  restore('qa-api-key', a);
  restore('qa-openai-key', b);
}

function onNativeLangChange() {
  const native = document.getElementById('qa-native-lang').value;
  localStorage.setItem(KEYS.nativeLang, native);
  preserveKeyInput(renderSettings);
}

function onTargetLangChange() {
  const target = document.getElementById('qa-target-lang').value;
  localStorage.setItem(KEYS.targetLang, target);

}

function onFeedbackLangChange(value) {

  // Update nav button text since UI language changed
  const homeBtn = document.getElementById('qa-home-btn');

async function saveSettings() {
  const key = document.getElementById('qa-api-key').value.trim();
  const native = document.getElementById('qa-native-lang').value;
  const target = document.getElementById('qa-target-lang').value;
  const msgEl = document.getElementById('qa-settings-msg');
  const btn = document.getElementById('qa-save-key');

  if (!key) { msgEl.innerHTML = `<div class="alert alert-error">${t('enterApiKey')}</div>`; return; }
  if (!target) { msgEl.innerHTML = `<div class="alert alert-error">${t('selectTargetLang')}</div>`; return; }

  localStorage.setItem(KEYS.nativeLang, native);
  localStorage.setItem(KEYS.targetLang, target);

  const openaiKey = document.getElementById('qa-openai-key').value.trim();
  if (openaiKey) localStorage.setItem(KEYS.openaiKey, openaiKey);
  else localStorage.removeItem(KEYS.openaiKey);

  btn.disabled = true;
  btn.textContent = t('validating');
  msgEl.innerHTML = '';

  try {
    localStorage.setItem(KEYS.apiKey, key);
    await callClaude(`TASK: GENERATE\n\nNo history yet. This is the student's first sentence. Start at basic A1 level.\n\nGenerate one simple ${nativeName()} sentence.`);

    btn.textContent = t('saveValidate');
  }
}

const BACKUP_SCHEMA = 1;

function exportData() {
  const data = {
    _app: 'translator',
    _schema: BACKUP_SCHEMA,
    _exportedAt: new Date().toISOString(),
    nativeLang: localStorage.getItem(KEYS.nativeLang),
    targetLang: localStorage.getItem(KEYS.targetLang),
    feedbackLang: localStorage.getItem(KEYS.feedbackLang),
    stats: load(KEYS.stats, null),
    history: load(KEYS.history, []),
    sessions: load(KEYS.sessions, []),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const date = new Date().toISOString().slice(0, 10);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `translator-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const msgEl = document.getElementById('qa-import-msg');
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data._app !== 'translator' || !data.history) throw new Error('invalid');
      if (data._schema && data._schema > BACKUP_SCHEMA) throw new Error('schema');
      if (!confirm(t('importConfirm'))) { input.value = ''; return; }
      if (data.nativeLang) localStorage.setItem(KEYS.nativeLang, data.nativeLang);
      if (data.targetLang) localStorage.setItem(KEYS.targetLang, data.targetLang);
      if (data.feedbackLang) localStorage.setItem(KEYS.feedbackLang, data.feedbackLang);
      if (data.stats) save(KEYS.stats, data.stats);
      save(KEYS.history, data.history);
      if (data.sessions) save(KEYS.sessions, data.sessions);
      msgEl.innerHTML = `<div class="alert alert-success">${t('importSuccess')}</div>`;
      setTimeout(() => renderSettings(), 800);
    } catch (e) {
      const msg = e.message === 'schema' ? t('importSchemaError') : t('importError');
      msgEl.innerHTML = `<div class="alert alert-error">${msg}</div>`;
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function deleteAllData() {
  if (!confirm(t('deleteAllConfirm'))) return;
  Object.values(KEYS).forEach(k => localStorage.removeItem(k));
  navigate('#/settings');
  renderSettings();
}

function startTimer() {
  timerStart = performance.now();
  cancelAnimationFrame(timerRAF);
  function tick() {
    const el = document.getElementById('qa-timer');
    if (!el) return;
    const elapsed = (performance.now() - timerStart) / 1000;
    el.textContent = Math.floor(elapsed) + 's';
    timerRAF = requestAnimationFrame(tick);
  }
  tick();
}

async function loadNextSentence() {
  // Clean up feedback Enter handler to prevent double-fire
  if (feedbackEnterHandler) {
    document.removeEventListener('keydown', feedbackEnterHandler);
    feedbackEnterHandler = null;
  }
  // If eval already provided the next sentence, skip the API call
  if (currentSentence) {
    renderPractice();
    return;
  }
  // Try to inject a retry of a previously-wrong sentence (no API call needed)
  const histForRetry = getHistory();
  if (shouldInjectRetry(histForRetry)) {
    const retry = pickRetrySentence(histForRetry);
    if (retry) {
      currentSentence = retry;
      lastGenerateUsage = { input_tokens: 0, output_tokens: 0 };
      renderPractice();
      return;
    }
  }
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div><p>${t('generating')}</p></div>`;
  const myEpoch = ++generateEpoch;
  try {
    const history = getHistory();
    const { result, usage } = await generateSentence(history);
    if (myEpoch !== generateEpoch) return; // navigated away — discard
    currentSentence = result;
    lastGenerateUsage = usage;
    renderPractice();
  } catch (e) {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="alert alert-error">${e.message}</div>
      <button class="btn btn-primary mt-16" onclick="renderPractice()">${t('retry')}</button>
    `;
  }
}

async function submitTranslation() {
  if (isSubmitting) return;
  const input = document.getElementById('qa-input');
  const attempt = input.value.trim();
  if (!attempt) return;

  isSubmitting = true;
  cancelAnimationFrame(timerRAF);
  const elapsed = (performance.now() - timerStart) / 1000;

  const submitBtn = document.getElementById('qa-submit');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="btn-spinner"></span>' + escapeHtml(t('evaluating'));
  input.disabled = true;

  try {
    const history = getHistory();
    const { result: evalResult, usage: evalUsage } = await evaluateTranslation(
      currentSentence.es, attempt, history, !!currentSentence.isRetry, currentSentence.previousAttempt
    );
    gcEvent('sentence-complete');

    const lastLevel = history.length > 0 ? history[history.length - 1].fluencyLevel : 'A1';
    const fluencyLevel = evalResult.fluency_level || lastLevel;
    const baseScore = evalResult.score;
    const timeBonus = evalResult.correct ? calculateTimeBonus(baseScore, elapsed, currentSentence.es) : 0;
    const sentenceScore = baseScore + timeBonus;

    const genUsage = lastGenerateUsage || { input_tokens: 0, output_tokens: 0 };
    // When eval includes next sentence, gen usage is zero (bundled in eval)
    const tokensIn = genUsage.input_tokens + evalUsage.input_tokens;
    const tokensOut = genUsage.output_tokens + evalUsage.output_tokens;

    const entry = {
      es: currentSentence.es,
      attempt,
      expected: evalResult.expected,
      baseScore,
      sentenceScore,
      responseTime: Math.round(elapsed * 10) / 10,
      correct: evalResult.correct,
      fluencyLevel,
      feedback: evalResult.feedback,
      notes: evalResult.notes || '',
      tokensIn,
      tokensOut,
      timestamp: Date.now(),
      ...(currentSentence.isRetry ? { isRetry: true } : {})
    };
    history.push(entry);
    saveHistory(history);

    const stats = getStats();
    stats.totalAttempted++;
    if (evalResult.correct) stats.totalCorrect++;
    if (baseScore > 75) {
      stats.currentStreak++;
      if (stats.currentStreak > stats.bestStreak) stats.bestStreak = stats.currentStreak;
    } else {
      stats.currentStreak = 0;
    }
    stats.runningScore = updateEMA(stats.runningScore, sentenceScore);
    stats.totalTimeSpent += elapsed;
    saveStats(stats);
    const tierEl = document.getElementById('qa-tier-emoji');
    if (tierEl) tierEl.textContent = getCefrEmoji(fluencyLevel);

    sessionSentences.push(entry);

    showFeedback(evalResult, baseScore, timeBonus, sentenceScore, elapsed, fluencyLevel, currentSentence.es, attempt);
    // Decide what comes next: retry of an unresolved wrong sentence, or the AI's bundled next.
    const retryPick = shouldInjectRetry(history) ? pickRetrySentence(history) : null;
    if (retryPick) {
      currentSentence = retryPick;
      lastGenerateUsage = { input_tokens: 0, output_tokens: 0 };
    } else if (evalResult.next_es) {
      currentSentence = { es: evalResult.next_es, hint: evalResult.next_hint || '', topic: evalResult.next_topic || '' };
      lastGenerateUsage = { input_tokens: 0, output_tokens: 0 }; // included in eval usage
    } else {
      currentSentence = null;
    }

  } catch (e) {
    document.getElementById('qa-error').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    submitBtn.disabled = false;
    submitBtn.textContent = t('submit');
    input.disabled = false;
  } finally {
    isSubmitting = false;
  }
}

function showFeedback(evalResult, baseScore, timeBonus, sentenceScore, elapsed, fluencyLevel, esOriginal, userAttempt) {
  const app = document.getElementById('app');
  const stats = getStats();
  const isCorrect = evalResult.correct;
  const notes = evalResult.notes || '';
  // Reset TTS cache for the new answer view
  if (ttsAudio) { try { ttsAudio.pause(); } catch {} ttsAudio = null; }
  if (ttsCache?.audioUrl) URL.revokeObjectURL(ttsCache.audioUrl);
  ttsCache = null;

  app.innerHTML = `
    <div class="status-bar">
      <div class="status-item">
        <span class="stat-emoji">${getCefrEmoji(fluencyLevel)}</span>
        <div class="value"><span class="level-badge">${fluencyLevel}</span></div>

async function toggleTTS(btn) {
  const text = btn.getAttribute('data-text');
  // If currently playing, stop.
  if (ttsAudio && !ttsAudio.paused) {
    ttsAudio.pause();
    ttsAudio.currentTime = 0;
    btn.classList.remove('playing');
    btn.innerHTML = '▶';
    return;
  }
  // If we have cached audio for this text, play it.
  if (ttsCache && ttsCache.text === text) {
    playTTS(btn, ttsCache.audioUrl);
    return;
  }
  // Fetch from OpenAI.
  const openaiKey = localStorage.getItem(KEYS.openaiKey);
  if (!openaiKey) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>';
  try {
    const res = await fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${openaiKey}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini-tts',
        voice: 'alloy',
        input: text,
        response_format: 'mp3',
      }),
    });
    if (!res.ok) throw new Error(`TTS error: ${res.status}`);
    const blob = await res.blob();
    const audioUrl = URL.createObjectURL(blob);
    ttsCache = { text, audioUrl };
    btn.disabled = false;
    playTTS(btn, audioUrl);
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '▶';
    btn.title = e.message;
  }
}

function playTTS(btn, audioUrl) {
  ttsAudio = new Audio(audioUrl);
  btn.classList.add('playing');
  btn.innerHTML = '■';
  btn.title = 'Stop';
  ttsAudio.addEventListener('ended', () => {
    btn.classList.remove('playing');
    btn.innerHTML = '▶';
    btn.title = 'Play audio';
  });
  ttsAudio.play().catch(() => {
    btn.classList.remove('playing');
    btn.innerHTML = '▶';
  });
}

function endSession() {
  if (sessionSentences.length > 0) {
    const sessions = getSessions();
    const avgScore = Math.round(sessionSentences.reduce((s, e) => s + e.sentenceScore, 0) / sessionSentences.length);
    sessions.push({
      date: sessionStart,
      duration: Math.round((Date.now() - sessionStart) / 1000),
      count: sessionSentences.length,
      averageScore: avgScore,
      fluencyStart: sessionSentences[0].fluencyLevel,
      fluencyEnd: sessionSentences[sessionSentences.length - 1].fluencyLevel,
      totalTokensIn: sessionSentences.reduce((s, e) => s + e.tokensIn, 0),
      totalTokensOut: sessionSentences.reduce((s, e) => s + e.tokensOut, 0),
    });
    saveSessions(sessions);
  }

  sessionStart = null;
  sessionSentences = [];
  currentSentence = null;
  cancelAnimationFrame(timerRAF);
}

function wireChartTooltip(canvas, points) {
  // points: [{x, y, label}]
  const tooltip = document.getElementById('qa-chart-tooltip');
  const hitRadius = 12;

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    let closest = null;
    let closestDist = Infinity;
    for (const p of points) {
      const d = Math.hypot(mx - p.x, my - p.y);
      if (d < hitRadius && d < closestDist) {
        closest = p;
        closestDist = d;
      }
    }

    if (closest) {
      tooltip.textContent = closest.label;
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 30) + 'px';
      tooltip.classList.add('visible');
    } else {
      tooltip.classList.remove('visible');
    }
  });

  canvas.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
}

function renderFluencyChart(history) {
  const container = document.getElementById('qa-fluency-chart');
  if (!container) return;

  // Dynamic window: show up to 1 sub-level above highest datapoint
  const maxIdx = history.reduce((max, h) => {
    const idx = CEFR_LEVELS.indexOf(h.fluencyLevel);
    return idx > max ? idx : max;
  }, 0);
  const ceilIdx = Math.min(maxIdx + 1, CEFR_LEVELS.length - 1);
  const visibleLevels = CEFR_LEVELS.slice(0, ceilIdx + 1);

  const perLevel = 18;
  const height = Math.max(100, visibleLevels.length * perLevel + 16);
  const width = container.clientWidth;
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  container.style.height = height + 'px';
  container.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const padding = { top: 8, bottom: 8, left: 30, right: 8 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;

  ctx.fillStyle = '#8899aa';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  visibleLevels.forEach((lvl, i) => {
    const y = padding.top + chartH - (i / (visibleLevels.length - 1)) * chartH;
    ctx.fillText(lvl, 2, y + 3);
    ctx.strokeStyle = '#2a3045';
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
  });

  if (history.length < 2) return;
  const step = chartW / (history.length - 1);

  ctx.beginPath();
  ctx.strokeStyle = '#53d8a8';
  ctx.lineWidth = 2;
  history.forEach((h, i) => {
    const lvlIdx = CEFR_LEVELS.indexOf(h.fluencyLevel);
    const idx = Math.max(0, Math.min(lvlIdx, ceilIdx));
    const x = padding.left + i * step;
    const y = padding.top + chartH - (idx / (visibleLevels.length - 1)) * chartH;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  const points = [];
  history.forEach((h, i) => {
    const lvlIdx = CEFR_LEVELS.indexOf(h.fluencyLevel);
    const idx = Math.max(0, Math.min(lvlIdx, ceilIdx));
    const x = padding.left + i * step;
    const y = padding.top + chartH - (idx / (visibleLevels.length - 1)) * chartH;
    ctx.beginPath();
    ctx.fillStyle = h.correct ? '#53d8a8' : '#e74c6f';
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
    const emoji = getCefrEmoji(h.fluencyLevel);
    points.push({ x, y, label: `${emoji} ${h.fluencyLevel}` });
  });
  wireChartTooltip(canvas, points);
}

function renderScoreChart(history) {
  const container = document.getElementById('qa-score-chart');
  if (!container || history.length < 2) return;

  // Compute running EMA for each point
  const scores = [];
  let ema = history[0].sentenceScore;
  scores.push(ema);
  for (let i = 1; i < history.length; i++) {
    ema = ema + EMA_ALPHA * (history[i].sentenceScore - ema);
    scores.push(Math.round(ema));
  }

  const peakScore = Math.max(...scores);
  const maxScore = peakScore > 100 ? Math.ceil(peakScore / 10) * 10 : 100;
  const gridLines = [0, 25, 50, 75, 100].filter(v => v <= maxScore);
  if (maxScore > 100) gridLines.push(maxScore);
  const height = 150;
  const width = Math.max(history.length * 20, container.clientWidth);
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  container.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const padding = { top: 8, bottom: 8, left: 30, right: 8 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;

  // Grid lines and labels
  ctx.fillStyle = '#8899aa';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  gridLines.forEach(val => {
    const y = padding.top + chartH - (val / maxScore) * chartH;
    ctx.fillText(val, 2, y + 3);
    ctx.strokeStyle = '#2a3045';
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
  });

  const step = chartW / (history.length - 1);

  // EMA line
  ctx.beginPath();
  ctx.strokeStyle = '#0d6efd';
  ctx.lineWidth = 2;
  scores.forEach((s, i) => {
    const x = padding.left + i * step;
    const y = padding.top + chartH - (Math.min(s, maxScore) / maxScore) * chartH;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots colored by correct/incorrect
  const points = [];
  history.forEach((h, i) => {
    const x = padding.left + i * step;
    const y = padding.top + chartH - (Math.min(scores[i], maxScore) / maxScore) * chartH;
    ctx.beginPath();
    ctx.fillStyle = h.correct ? '#0d6efd' : '#e74c6f';
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
    const emoji = getTierEmoji(scores[i]);
    points.push({ x, y, label: `${emoji} ${scores[i]}` });
  });
  wireChartTooltip(canvas, points);
}

function renderVolumeChart(history) {
  const container = document.getElementById('qa-volume-chart');
  if (!container || history.length < 1) return;

  // Aggregate sentence counts by local YYYY-MM-DD, filling gaps with 0
  const dayKey = (ts) => {
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  };
  const counts = new Map();
  for (const h of history) {
    const k = dayKey(h.timestamp);
    counts.set(k, (counts.get(k) || 0) + 1);
  }
  const firstDate = new Date(history[0].timestamp); firstDate.setHours(0, 0, 0, 0);
  const lastDate = new Date(history[history.length - 1].timestamp); lastDate.setHours(0, 0, 0, 0);
  const days = [];
  for (let d = new Date(firstDate); d <= lastDate; d.setDate(d.getDate() + 1)) {
    const k = dayKey(d.getTime());
    days.push({ date: new Date(d), count: counts.get(k) || 0 });
  }
  if (days.length === 0) return;

  const peak = Math.max(...days.map(d => d.count), 1);
  const maxY = Math.max(5, Math.ceil(peak / 5) * 5);
  const gridLines = [0, Math.round(maxY / 2), maxY];

  const height = 150;
  const width = Math.max(days.length * 20, container.clientWidth);
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  container.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const padding = { top: 8, bottom: 20, left: 30, right: 8 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;

  // Grid lines
  ctx.fillStyle = '#8899aa';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  gridLines.forEach(val => {
    const y = padding.top + chartH - (val / maxY) * chartH;
    ctx.fillText(val, 2, y + 3);
    ctx.strokeStyle = '#2a3045';
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
  });

  const step = days.length > 1 ? chartW / (days.length - 1) : 0;
  const yellow = '#f5c518';

  // Line
  ctx.beginPath();
  ctx.strokeStyle = yellow;
  ctx.lineWidth = 2;
  days.forEach((d, i) => {
    const x = padding.left + i * step;
    const y = padding.top + chartH - (d.count / maxY) * chartH;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots + tooltip points
  const points = [];
  days.forEach((d, i) => {
    const x = padding.left + i * step;
    const y = padding.top + chartH - (d.count / maxY) * chartH;
    ctx.beginPath();
    ctx.fillStyle = yellow;
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
    const label = `${d.date.getMonth() + 1}/${d.date.getDate()}: ${d.count}`;
    points.push({ x, y, label });
  });

  // X-axis labels: max 15, evenly spaced
  ctx.fillStyle = '#8899aa';
  ctx.textAlign = 'center';
  const maxLabels = 15;
  const labelStride = Math.max(1, Math.ceil(days.length / maxLabels));
  for (let i = 0; i < days.length; i += labelStride) {
    const x = padding.left + i * step;
    const d = days[i].date;
    ctx.fillText(`${d.getMonth() + 1}/${d.getDate()}`, x, height - 6);
  }

  wireChartTooltip(canvas, points);
}

        ${history.map((h, i) => `
          <tr class="expand-row" onclick="toggleExpand(${i})">
            <td>${escapeHtml(h.es)}</td>
            <td style="color:${h.correct ? 'var(--accent)' : 'var(--error)'}">${escapeHtml(h.attempt)}</td>
            <td>${h.sentenceScore}</td>
            <td><span class="level-badge" style="font-size:0.65rem;padding:1px 6px">${h.fluencyLevel}</span></td>
            <td>${h.responseTime}s</td>
          </tr>
          <tr><td colspan="5">
            <div class="expand-content" id="qa-expand-${i}">
              <strong>${t('expectedLabel')}:</strong> ${escapeHtml(h.expected)}<br>
              <strong>${t('feedback')}:</strong> ${renderFeedbackMd(h.feedback)}
              <strong>${t('baseScore')}:</strong> ${h.baseScore}${h.sentenceScore > h.baseScore ? ` <span style="color:#53d8a8">+${h.sentenceScore - h.baseScore}</span>` : ''}<br>
              <span class="text-muted">${new Date(h.timestamp).toLocaleString()}</span>
            </div>
          </td></tr>
        `).join('')}
      </tbody>
    </table>
  `;
  updateScrollHint();
  container.addEventListener('scroll', updateScrollHint);
}

function updateScrollHint() {
  const container = document.getElementById('qa-history-table');
  const hint = document.getElementById('qa-scroll-hint');
  if (!container || !hint) return;
  const hasMore = container.scrollHeight - container.scrollTop - container.clientHeight > 20;
  hint.classList.toggle('visible', hasMore);
}

function toggleExpand(i) {
  const el = document.getElementById('qa-expand-' + i);
  if (el) el.classList.toggle('open');
}

function renderSessions(sessions) {
  const container = document.getElementById('qa-sessions');
  if (!container) return;

  container.innerHTML = sessions.slice().reverse().map(s => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <strong>${new Date(s.date).toLocaleDateString()}</strong>
          <span class="text-muted text-small">${Math.round(s.duration / 60)}min</span>
        </div>
        <div>
          ${t('nSentences')(s.count)} &middot; ${t('avg')} ${s.averageScore}
          &middot; ${s.fluencyStart} \u2192 ${s.fluencyEnd}
        </div>
      </div>
    </div>
  `).join('');
}

// ── Util ───────────────────────────────────────────────────────────
function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderFeedbackMd(s) {
  if (!s) return '';
  const lines = s.split('\n');
  let html = '';
  let inList = false;
  for (const raw of lines) {
    const line = raw.trim();
    if (/^[-*] /.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + inlineFormat(line.replace(/^[-*] /, '')) + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (line) html += '<p>' + inlineFormat(line) + '</p>';
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function inlineFormat(s) {
  return escapeHtml(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

// ── Init ───────────────────────────────────────────────────────────
handleRoute();
gcEvent('page-loaded');
</script>
